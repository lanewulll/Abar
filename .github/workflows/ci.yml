name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: Test and build (Apple Silicon)
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Check environment
        run: npm run check

      - name: Test
        run: npm test

      - name: Build release app
        run: npm run build

      - name: Verify application bundle
        run: |
          test -f "native-overlay/dist/Abar.app/Contents/Info.plist"
          test -f "native-overlay/dist/Abar.app/Contents/Resources/AppIcon.icns"
          file "native-overlay/dist/Abar.app/Contents/MacOS/AbarNativeOverlay" | grep -q "arm64"
          test "$(plutil -extract CFBundleName raw "native-overlay/dist/Abar.app/Contents/Info.plist")" = "Abar"
          test "$(plutil -extract LSMinimumSystemVersion raw "native-overlay/dist/Abar.app/Contents/Info.plist")" = "14.0"
          codesign --verify --deep --strict "native-overlay/dist/Abar.app"
