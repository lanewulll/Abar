name: 功能建议
description: 提议新的能力或体验改进
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 请先描述使用场景，而不只是实现方式。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案
  - type: dropdown
    id: scope
    attributes:
      label: 主要影响
      options:
        - macOS 界面
        - Codex Hook
        - 额度查询
        - Skill 扫描
        - 构建与安装
        - 文档
    validations:
      required: true
